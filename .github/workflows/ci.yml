name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-pty needs Python + a C++ toolchain to build its native module on Linux.
      # ubuntu-latest already has build-essential, but Python 3.12+ removed distutils
      # which node-gyp still expects, so install Python 3.11 explicitly.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm test
